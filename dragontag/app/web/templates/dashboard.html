{% extends "base.html" %}
{% block content %}
<section class="space-y-6">
  <div class="bg-slate-800 rounded-lg p-6 border border-slate-700">
    <h2 class="text-lg font-semibold mb-3">Drop audio files</h2>
    <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-3">
      <input type="file" name="files" multiple class="block w-full text-sm" />
      <button class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500">Upload & queue</button>
      <p class="text-xs text-slate-400">FLAC, MP3, WAV, M4A. Files are saved to the watched drop folder and processed automatically.</p>
    </form>
  </div>

  <div class="bg-slate-800 rounded-lg p-6 border border-slate-700">
    <div class="flex items-center justify-between mb-3">
      <h2 class="text-lg font-semibold">Recent jobs</h2>
      <button hx-get="/jobs/table" hx-target="#jobs-table" hx-swap="innerHTML"
              class="text-sm text-slate-300 hover:text-white">Refresh</button>
    </div>
    <div id="jobs-table" hx-get="/jobs/table" hx-trigger="load, every 5s" hx-swap="innerHTML">
      {% include "_jobs_table.html" %}
    </div>
  </div>
</section>
{% endblock %}
