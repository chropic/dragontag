<!doctype html>
<html><head>
  <meta charset="utf-8"><title>Sign in — dragontag</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen flex items-center justify-center">
  <form method="post" action="/login" class="bg-slate-800 p-8 rounded-lg w-80 space-y-3 border border-slate-700">
    <h1 class="text-xl font-semibold">dragontag</h1>
    {% if error %}<div class="text-red-400 text-sm">{{ error }}</div>{% endif %}
    <input name="username" placeholder="username" class="w-full p-2 rounded bg-slate-900 border border-slate-700" />
    <input name="password" placeholder="password" type="password" class="w-full p-2 rounded bg-slate-900 border border-slate-700" />
    <button class="w-full p-2 rounded bg-indigo-600 hover:bg-indigo-500">Sign in</button>
  </form>
</body></html>
