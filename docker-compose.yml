services:
  dragontag:
    build: .
    image: dragontag:latest
    container_name: dragontag
    ports:
      - "7593:7593"
    volumes:
      - /srv/music/library:/library
      - /srv/music/drop:/drop
      - ./config:/config
    secrets:
      - dragontag_password
      - acoustid_api_key
    environment:
      - AIO_USERNAME=charlie
      - AIO_PASSWORD_FILE=/run/secrets/dragontag_password
      - AIO_ACOUSTID_KEY_FILE=/run/secrets/acoustid_api_key
      - AIO_SESSION_SECRET_FILE=/run/secrets/dragontag_password
      - TZ=America/New_York
    restart: unless-stopped

secrets:
  dragontag_password:
    file: ./secrets/password.txt
  acoustid_api_key:
    file: ./secrets/acoustid_key.txt
