{% extends "base.html" %}
{% block content %}
<section class="space-y-6">
  <div class="bg-[#0c0c0c] p-6 border border-[#4a4a4a]">
    <h2 class="font-mono font-semibold text-lg mb-3">Drop audio files</h2>
    <form action="/upload" method="post" enctype="multipart/form-data" class="space-y-3">
      <input type="file" name="files" multiple class="block w-full text-sm text-[#cfcfcf]" />
      <button class="px-4 py-2 bg-white text-black font-mono font-semibold hover:bg-[#cfcfcf] transition-colors">Upload &amp; queue</button>
      <p class="text-xs text-[#8a8a8a]">FLAC, MP3, WAV, M4A. Files are saved to the watched drop folder and processed automatically.</p>
    </form>
  </div>

  <div class="bg-[#0c0c0c] p-6 border border-[#4a4a4a]">
    <div class="flex items-center justify-between mb-3">
      <h2 class="font-mono font-semibold text-lg">Recent jobs</h2>
      <button hx-get="/jobs/table" hx-target="#jobs-table" hx-swap="innerHTML"
              class="text-sm text-[#cfcfcf] hover:text-white">Refresh</button>
    </div>
    <div id="jobs-table" hx-get="/jobs/table?page={{ page }}" hx-trigger="load, every 5s" hx-swap="innerHTML">
      {% include "_jobs_table.html" %}
    </div>
  </div>
</section>
{% endblock %}
