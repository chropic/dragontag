<table class="w-full text-sm">
  <thead class="text-[#8a8a8a] border-b border-[#4a4a4a]">
    <tr>
      <th class="text-left py-2">File</th>
      <th class="text-left">Status</th>
      <th class="text-left">Score</th>
      <th class="text-left">Updated</th>
      <th class="text-left">Log</th>
    </tr>
  </thead>
  <tbody>
  {% for j in jobs %}
    <tr class="border-b border-[#4a4a4a] hover:bg-[#0c0c0c]/50">
      <td class="py-2 truncate max-w-xs"><a class="text-[#cfcfcf] hover:underline" href="/jobs/{{ j.id }}">{{ j.original_name }}</a></td>
      <td>
        <span class="px-2 py-0.5 text-xs
          {% if j.status.value == 'done' %}bg-[#c7f0c7] text-black{% elif j.status.value == 'error' %}bg-[#ffb4b4] text-black
          {% elif j.status.value == 'needs_review' %}bg-[#f2e5b5] text-black{% else %}bg-[#131313]{% endif %}">
          {{ j.status.value }}
        </span>
      </td>
      <td>{% if j.score is not none %}{{ "%.2f"|format(j.score) }}{% endif %}</td>
      <td class="text-[#8a8a8a] text-xs">{{ format_local(j.updated_at) }}</td>
      <td>
        <button class="text-[#8a8a8a] hover:text-white text-xs"
                hx-get="/jobs/{{ j.id }}/log"
                hx-target="#log-{{ j.id }}"
                hx-swap="innerHTML"
                hx-on:click="this.closest('tr').nextElementSibling.classList.toggle('hidden')">▶</button>
      </td>
    </tr>
    <tr id="log-{{ j.id }}" class="hidden border-b border-[#4a4a4a]">
      <td colspan="5" class="p-0"></td>
    </tr>
  {% else %}
    <tr><td class="py-4 text-[#8a8a8a]" colspan="5">No jobs yet.</td></tr>
  {% endfor %}
  </tbody>
</table>
