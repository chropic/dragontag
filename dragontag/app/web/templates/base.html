<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{% block title %}dragontag{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">
  <nav class="bg-slate-800 px-4 py-3 flex items-center gap-4 border-b border-slate-700">
    <a href="/" class="font-semibold">dragontag</a>
    <a href="/" class="text-slate-300 hover:text-white">Dashboard</a>
    <a href="/review" class="text-slate-300 hover:text-white">Review</a>
    <a href="/settings" class="text-slate-300 hover:text-white">Settings</a>
    <form action="/logout" method="post" class="ml-auto">
      <button class="text-slate-400 hover:text-white text-sm">Log out</button>
    </form>
  </nav>
  <main class="max-w-6xl mx-auto p-6">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
