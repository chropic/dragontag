{% extends "base.html" %}
{% block content %}
<h2 class="text-xl font-semibold mb-4">Settings</h2>
<form method="post" action="/settings" class="space-y-4 max-w-2xl text-sm">
  <div class="bg-slate-800 p-4 rounded border border-slate-700 space-y-2">
    <label class="flex items-center gap-2">
      <input type="checkbox" name="acoustid_enabled" {% if settings.acoustid_enabled %}checked{% endif %}>
      Enable AcoustID fingerprint fallback
    </label>
    <label class="block">
      <span class="text-slate-400">Auto-apply threshold</span>
      <input type="number" name="score_threshold" step="0.01" min="0" max="1"
             value="{{ settings.score_threshold }}"
             class="mt-1 p-1 rounded bg-slate-900 border border-slate-700 w-32">
    </label>
    <label class="flex items-center gap-2">
      <input type="checkbox" name="watcher_enabled" {% if settings.watcher_enabled %}checked{% endif %}>
      Watch drop folder for new files
    </label>
  </div>

  <div class="bg-slate-800 p-4 rounded border border-slate-700 space-y-2">
    <h3 class="font-semibold">Filename templates</h3>
    <label class="block">
      <span class="text-slate-400">Single disc</span>
      <input name="filename_template_single" value="{{ settings.filename_template_single }}"
             class="mt-1 w-full p-1 rounded bg-slate-900 border border-slate-700 font-mono">
    </label>
    <label class="block">
      <span class="text-slate-400">Multi-disc (inside Disc N folder)</span>
      <input name="filename_template_multidisc" value="{{ settings.filename_template_multidisc }}"
             class="mt-1 w-full p-1 rounded bg-slate-900 border border-slate-700 font-mono">
    </label>
    <label class="block">
      <span class="text-slate-400">Multi-disc folder name</span>
      <input name="multidisc_folder_template" value="{{ settings.multidisc_folder_template }}"
             class="mt-1 w-full p-1 rounded bg-slate-900 border border-slate-700 font-mono">
    </label>
    <p class="text-xs text-slate-500">Vars: <code>{track}</code> <code>{disc}</code> <code>{title}</code> <code>{artist}</code> <code>{ext}</code> <code>{disctotal}</code> <code>{tracktotal}</code></p>
  </div>

  <div class="bg-slate-800 p-4 rounded border border-slate-700 space-y-2">
    <h3 class="font-semibold">Multi-value separators</h3>
    <div class="grid grid-cols-2 gap-2">
      <label>ARTIST <input name="sep_ARTIST" value="{{ settings.separators.ARTIST }}" class="p-1 rounded bg-slate-900 border border-slate-700 w-24 ml-2 font-mono"></label>
      <label>album_artist <input name="sep_album_artist" value="{{ settings.separators.album_artist }}" class="p-1 rounded bg-slate-900 border border-slate-700 w-24 ml-2 font-mono"></label>
      <label>ARTISTS <input name="sep_ARTISTS" value="{{ settings.separators.ARTISTS }}" class="p-1 rounded bg-slate-900 border border-slate-700 w-24 ml-2 font-mono"></label>
      <label>GENRE <input name="sep_GENRE" value="{{ settings.separators.GENRE }}" class="p-1 rounded bg-slate-900 border border-slate-700 w-24 ml-2 font-mono"></label>
    </div>
  </div>

  <button class="px-4 py-2 rounded bg-indigo-600 hover:bg-indigo-500">Save</button>
</form>
{% endblock %}
