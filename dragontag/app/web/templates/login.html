<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>dragontag | Sign In</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml" />
  <!-- Self-hosted stylesheet (no CDN) so the sign-in page loads on an
       air-gapped / network-restricted box. -->
  <link rel="stylesheet" href="/static/fonts/fonts.css">
  <link rel="stylesheet" href="/static/app.css">
  <style>
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 9999;
      background: linear-gradient(180deg,rgba(255,255,255,.03) 0,rgba(255,255,255,.03) 1px,transparent 1px,transparent 3px);
      background-size: 100% 3px;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      box-shadow: 0 0 0 1px #c7f0c7, inset 0 0 0 1px rgba(199,240,199,0.1);
    }
    @keyframes dt-blink { 0%,48%{opacity:1} 49%,100%{opacity:0} }
  </style>
</head>
<body class="bg-black text-white font-mono min-h-screen flex items-center justify-center p-6">
  <form method="post" action="/login"
        class="relative bg-[#0a0d0a] p-7 w-[420px] space-y-4 border border-[#335533]"
        style="box-shadow:0 0 40px rgba(199,240,199,.04)">
    <!-- corner reticles. !mt-0 shields them from the form's space-y-4, which
         otherwise adds margin-top to every child after the first — margins
         offset absolutely-positioned boxes, so the top-right reticle (the
         only top-anchored non-first child) sat 16px below the corner. -->
    <span class="absolute !mt-0 -top-px -left-px w-2.5 h-2.5 border-t border-l border-[#c7f0c7]"></span>
    <span class="absolute !mt-0 -top-px -right-px w-2.5 h-2.5 border-t border-r border-[#c7f0c7]"></span>
    <span class="absolute !mt-0 -bottom-px -left-px w-2.5 h-2.5 border-b border-l border-[#c7f0c7]"></span>
    <span class="absolute !mt-0 -bottom-px -right-px w-2.5 h-2.5 border-b border-r border-[#c7f0c7]"></span>

    <div class="flex items-center gap-2.5 font-bold text-lg">
      <span class="text-[#c7f0c7]" style="text-shadow:0 0 12px rgba(199,240,199,.7)">&#9608;</span>dragontag
    </div>
    <div class="text-[11px] text-[#5a5a5a] tracking-widest -mt-2">AUTHENTICATION REQUIRED</div>

    {% if error %}
    <div class="border border-[#ffb4b4] bg-[#ffb4b4]/10 px-3 py-2 text-[#ffb4b4] text-xs">{{ error }}</div>
    {% endif %}

    <label class="block">
      <span class="text-xs text-[#8a8a8a]">login</span>
      <input name="username" placeholder="username" autocomplete="username" value="{{ username or '' }}"
             class="mt-1 w-full p-2.5 bg-black border border-[#2a2a2a] text-white placeholder-[#3a3a3a] text-sm focus:outline-none" />
    </label>
    <label class="block">
      <span class="text-xs text-[#8a8a8a]">password</span>
      <input name="password" placeholder="••••••••••" type="password" autocomplete="current-password"
             class="mt-1 w-full p-2.5 bg-black border border-[#335533] text-white placeholder-[#3a3a3a] text-sm focus:outline-none" />
    </label>
    <button class="w-full p-2.5 border border-[#335533] bg-[#0c0e0c] text-[#c7f0c7] text-sm hover:bg-[#0f140f] transition-colors">
      [ authenticate &#9656; ]
    </button>
    <div class="text-[11px] text-[#5a5a5a] text-center pt-1">~$ dragontag --login</div>
  </form>
</body>
</html>
